# FILE: printer.cfg
# VERSION: 1.0.0.3
# PRINTER: xCeler(Optimus F250)
# Klipper 설정 매개변수에 대한 설명은 아래 링크를 참조하세요.
# https://www.klipper3d.org/Config_Reference.html

# --- [외부 설정 파일 포함] ---
[include mainsail.cfg]       # 웹 인터페이스(Mainsail) 구동을 위한 기본 매크로 설정 포함
[include timelapse.cfg]      # 타임랩스 촬영을 위한 설정 파일 포함
[include cubi_gcode_macro.cfg] # 사용자가 만든 커스텀 G-code 매크로 파일 포함
 
# --- [프로브 (Auto Bed Leveling 센서)] ---
[probe]
pin: ^PC14                  # 프로브가 연결된 메인보드 핀 번호 (^는 풀업 저항 사용을 의미)
x_offset: 0                 # 노즐과 프로브 사이의 X축 거리 차이 (0이므로 노즐과 같은 X선상)
y_offset: 0                 # 노즐과 프로브 사이의 Y축 거리 차이 (0이므로 노즐과 같은 Y선상)
#z_offset: 0                # 노즐과 프로브 사이의 높이 차이 (파일 맨 아래 SAVE_CONFIG에서 자동 관리됨)
speed: 5                    # 베드를 찍을 때 프로브가 내려가는 속도 (5mm/s)
samples: 3                  # 한 지점을 측정할 때 3번 반복해서 측정 (오차를 줄이기 위함)
sample_retract_dist: 5      # 다음 측정을 위해 위로 5mm 들어 올림
samples_tolerance: 0.2      # 3번 측정한 값의 오차가 0.2mm 이내여야 통과
samples_tolerance_retries: 3 # 오차 범위를 벗어나면 최대 3번까지 다시 측정 시도

# --- [베드 메쉬 (베드 평탄도 측정 곡면 데이터)] ---
[bed_mesh]
speed: 300                  # 메쉬 측정을 위해 이동할 때의 X/Y 이동 속도 (300mm/s)
horizontal_move_z: 5        # 점과 점 사이를 이동할 때 Z축을 5mm 띄우고 이동 (충돌 방지)
mesh_min: 20, 20            # 메쉬 측정을 시작할 최소 X, Y 좌표
mesh_max: 230, 230          # 메쉬 측정을 끝낼 최대 X, Y 좌표
probe_count: 3,3            # 가로 3개, 세로 3개 총 9개의 지점을 측정
algorithm: bicubic          # 측정된 점들 사이의 빈 공간을 계산하는 곡면 보간 알고리즘 (부드럽게 연결)
fade_start: 0.0             # 출력물 높이 0.0mm부터 Z축 보정을 시작함
fade_end: 10                # 출력물 높이 10mm가 되면 베드 휨 보정을 서서히 끝내고 평면으로 출력함

# --- [강제 이동 허용] ---
[force_move]
enable_force_move: true     # 홈(G28)을 잡지 않은 상태에서도 모터를 강제로 움직일 수 있게 허용

# --- [커스텀 호밍(원점 복귀) 매크로] ---
[homing_override]
axes: xyz                   # X, Y, Z축의 호밍 방식을 아래 코드로 덮어씀
gcode:
  # 아래는 호밍에 사용할 변수들을 설정하는 부분입니다.
  {% set X_OFFSET = 10 %}       # X축 호밍 후 떨어질 거리
  {% set Y_OFFSET = -5 %}       # Y축 호밍 후 떨어질 거리
  {% set Z_OFFSET = 5 %}        # Z축 호밍 후 띄울 높이
  {% set XY_HOME_POS = 125 %}   # Z축 호밍을 위해 헤드가 이동할 중앙 좌표 (125, 125)
  {% set XY_OFFSET_SPD = 2000 %}# 호밍 후 이동할 때의 속도
  {% set XY_STABLE = 2000 %}    # 센서리스 호밍 후 안정화를 위해 대기할 시간 (2000ms = 2초)
  {% set Z_SAFE = 0.2 %}        # 센서리스 호밍 중 바닥 긁힘 방지를 위해 Z축을 살짝(0.2mm) 띄움
  {% set Y_SAFE = -5 %}         # X축 호밍 전 Y축 간섭 방지를 위해 약간 이동하는 거리
  
  M118 "axes = {params}"        # 콘솔에 어떤 축을 호밍하는지 메시지 출력
  
  # --- X축만 호밍할 때 (G28 X) ---
  {% if 'X' in params and 'Y' not in params and 'Z' not in params %}
    M118 "Only X requested."
    G91                         # 상대 좌표계로 전환
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5 # Z축 살짝 올림
    FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5 # (참고: STEPPER=stepper_x로 되어 있으나 변수는 Y_SAFE 사용)
    G28 X                       # 실제 X축 원점 복귀 명령어 수행 (센서리스 부딪힘)
    G0 X{X_OFFSET} F{XY_OFFSET_SPD} # 부딪힌 후 벽에서 설정한 값(10mm)만큼 떨어짐
  
  # --- Y축만 호밍할 때 (G28 Y) ---
  {% elif 'Y' in params and 'X' not in params and 'Z' not in params %}
    M118 "Only Y requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    G28 Y                       # Y축 호밍
    G0 Y{Y_OFFSET} F{XY_OFFSET_SPD} # 벽에서 떨어짐
  
  # --- Z축만 호밍할 때 (G28 Z) ---
  {% elif 'Z' in params and 'X' not in params and 'Y' not in params %}
    M118 "Only Z requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    # 만약 X축이 아직 호밍되지 않았다면 먼저 X축을 호밍함
    {% if 'x' not in printer.toolhead.homed_axes %}
      FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
      FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
      G91
      G28 X
      G0 X{X_OFFSET} F{XY_OFFSET_SPD}
      G4 P{XY_STABLE}           # 2초 대기
    {% endif %}
    # 만약 Y축이 아직 호밍되지 않았다면 먼저 Y축을 호밍함
    {% if 'y' not in printer.toolhead.homed_axes %}
      G91
      G28 Y
      G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}
    {% endif %}
    
    G90                         # 절대 좌표계로 전환
    G1 X{XY_HOME_POS} Y{XY_HOME_POS} F{XY_OFFSET_SPD} # 베드 중앙(125,125)으로 이동
    G28 Z                       # Z축 호밍 (중앙에서 프로브로 베드 터치)
    G1 Z{Z_OFFSET} F1000        # 측정이 끝나면 Z축을 5mm 들어올림

  # --- X, Y축을 함께 호밍할 때 (G28 XY) ---
  {% elif 'XY' in params and 'Z' not in params %}
    M118 "Only XY requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
    G28 X                       # X축 호밍
    G0 X{X_OFFSET} F{XY_OFFSET_SPD}
    G4 P{XY_STABLE}             # 센서리스 드라이버 안정화 대기
    G28 Y                       # Y축 호밍
    G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}

  # --- X, Y, Z 전체 호밍할 때 (G28) ---
  {% elif 'X' not in params and 'Y' not in params and 'Z' not in params %}
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
    G28 X                       # X 호밍
    G0 X{X_OFFSET} F{XY_OFFSET_SPD}
    G4 P{XY_STABLE} 
    G28 Y                       # Y 호밍
    G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}
    G90
    G1 X{XY_HOME_POS} Y{XY_HOME_POS} F{XY_OFFSET_SPD} # 중앙 이동
    G28 Z                       # Z 호밍
    G1 Z{Z_OFFSET} F1000        # Z 5mm 띄움
  {% endif %}

# --- [X축 모터 설정] ---
[stepper_x]
step_pin: PB10              # 스텝(동작) 핀 번호
dir_pin: PB2                # 방향 핀 번호
enable_pin: !PB11           # 모터 활성화 핀 번호 (!는 신호 반전)
microsteps: 32              # 마이크로스텝 설정 (1스텝을 32개로 쪼개어 부드럽게 움직임)
rotation_distance: 40       # 모터가 1회전할 때 이동하는 거리 (풀리 20T * 벨트피치 2mm = 40mm)
endstop_pin: tmc2209_stepper_x:virtual_endstop # 가상 엔드스탑 사용 (물리 스위치 대신 센서리스 호밍 사용)
position_endstop: -11.5     # 호밍 시 헤드가 부딪히는 벽의 실제 좌표
position_max: 266           # X축이 이동할 수 있는 최대 좌표
position_min: -11.5         # X축이 이동할 수 있는 최소 좌표
homing_speed: 60            # 호밍할 때의 이동 속도 (60mm/s)
homing_retract_dist: 0      # 호밍 후 다시 측정하기 위해 뒤로 물러나는 거리 (센서리스이므로 0)

# --- [X축 TMC2209 모터 드라이버 설정] ---
[tmc2209 stepper_x]         # UART 사용 이유 : 스톨가드를 통해 ENDSTOP 없이 영점 잡기
uart_pin: PC11              # UART 통신 핀
tx_pin: PC10                # UART 송신 핀
diag_pin: ^PC0              # 스톨가드(충돌 감지) 신호를 메인보드에 전달할 핀
driver_SGTHRS: 100          # ★ 센서리스 호밍 민감도 (0~255, 숫자가 클수록 아주 약한 힘에도 충돌로 인식)
hold_current: 0.50          # 모터가 멈춰있을 때 유지 전류 (발열 제어용)
sense_resistor: 0.110       # 드라이버 칩의 전류 측정용 저항값
uart_address: 0             # 드라이버의 UART 통신 주소
run_current: 0.9            # 모터가 작동할 때 공급하는 전류 (0.9A)
stealthchop_threshold: 0    # 0이면 항상 스프레드사이클(SpreadCycle) 모드 사용 (소음보단 파워/정확도 중시)
# 아래 driver_ 설정들은 모터 드라이버의 세부 파형 및 타이밍을 튜닝한 전문적인 값입니다.
driver_IHOLDDELAY : 8
driver_TPOWERDOWN : 20
driver_TBL : 1 
driver_TOFF : 2 
driver_HEND : 1 
driver_HSTRT : 7 
driver_PWM_AUTOGRAD : False
driver_PWM_AUTOSCALE : False
driver_PWM_LIM : 12
driver_PWM_REG : 8
driver_PWM_FREQ : 2 
driver_PWM_GRAD : 18 
driver_PWM_OFS : 36 

# --- [Y축 모터 설정] ---
[stepper_y]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop # Y축도 센서리스 호밍 사용
position_endstop: 261       # Y축 호밍 시 벽의 위치 좌표 (Max 위치에서 호밍됨을 의미)
position_max: 266           # Y축 최대 이동 가능 좌표
position_min: -6.0          # Y축 최소 이동 가능 좌표
homing_speed: 60
homing_retract_dist: 0

# --- [Y축 TMC2209 모터 드라이버 설정] ---
[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
diag_pin: PC1
driver_SGTHRS: 110          # Y축 센서리스 호밍 민감도
hold_current: 0.50
sense_resistor: 0.110
uart_address: 2
run_current: 0.9 
stealthchop_threshold: 0
# 세부 파형 설정 (X축과 동일)
driver_IHOLDDELAY : 8
driver_TPOWERDOWN : 20
driver_TBL : 1
driver_TOFF : 2
driver_HEND : 1
driver_HSTRT : 7
driver_PWM_AUTOGRAD : False
driver_PWM_AUTOSCALE : False
driver_PWM_LIM : 12
driver_PWM_REG : 8
driver_PWM_FREQ : 2
driver_PWM_GRAD : 18
driver_PWM_OFS : 36

# --- [Z축 모터 설정] ---
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 256             # Z축은 정밀도를 높이기 위해 256 마이크로스텝 사용
rotation_distance: 8        # Z축 리드스크류가 1회전할 때 이동하는 거리 (8mm)
endstop_pin: probe:z_virtual_endstop # 물리 스위치 대신 프로브를 Z축 엔드스탑으로 사용
position_max: 310           # Z축 (출력물) 최대 높이
position_min: -5            # Z축 최소 높이 (마이너스는 노즐이 베드 아래로 갈 수 있는 허용 오차)
homing_speed: 5             # Z축 호밍 속도 (베드 찍는 속도)
second_homing_speed: 5      # 두 번째 다시 찍을 때의 속도
homing_retract_dist: 10     # 베드를 한 번 찍고 다시 측정하기 위해 10mm 위로 올라감

# --- [Z축 TMC2209 모터 드라이버 설정] ---
[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.780          # Z모터 작동 전류 (0.78A)
hold_current: 0.800         # Z모터 정지 유지 전류 (베드가 무거워 떨어지지 않게 높게 설정된 편)
stealthchop_threshold: 999999 # Z축은 소음을 줄이기 위해 스텔스초프(StealthChop) 모드 항시 사용

# --- [압출기 (Extruder) 및 핫엔드 설정] ---
[extruder]
max_extrude_only_distance: 1000.0 # 한 번에 허용되는 필라멘트 최대 압출 길이 (안전장치, 필라멘트 로딩시 필요)
max_extrude_cross_section: 80 # 한 줄에 과도하게 많은 양이 압출되는 것을 허용 (퍼지 라인 등에 쓰임)
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 32
rotation_distance: 5.42     # 익스트루더 기어비 설정 (1회전 시 압출되는 길이, E-step 조정 시 변경)
nozzle_diameter: 0.4        # 장착된 노즐 구멍 크기 (0.4mm)
filament_diameter: 1.750    # 사용하는 필라멘트 두께 (1.75mm)
heater_pin: PC8             # 노즐 히터 핀 번호
sensor_type: my_custom_thermistor # 직접 정의한 온도 센서 모델(아래에 설정됨) 사용
sensor_pin: PA0             # 온도 센서 핀 번호
pressure_advance: 0.04      # 모서리 뭉침 방지를 위한 압력 전진(PA) 값
pressure_advance_smooth_time: 0.040 # PA 값을 부드럽게 적용하는 곡선 시간
min_temp: 0                 # 노즐 최소 허용 온도
max_temp: 320               # 노즐 최대 허용 온도 (320도까지 올라가는 고온 핫엔드 설정)

# --- [사용자 정의 온도 센서 (Thermistor) 프로필] ---
[thermistor my_custom_thermistor]
# 특정 온도에서의 저항값을 입력하여 온도 계산 곡선을 Klipper가 만들도록 함
temperature1: 100 
resistance1: 6610 
temperature2: 240 
resistance2: 273  
temperature3: 25 
resistance3: 100000 

# --- [노즐 히터 안전장치 (Thermal Runaway Protection)] ---
[verify_heater extruder]
max_error: 300              # 목표 온도와 실제 온도의 누적 차이가 이 값을 넘으면 프린터 강제 종료 (화재 방지)
check_gain_time: 20         # 20초 동안 가열 명령을 내렸을 때
hysteresis: 5               # 목표 온도 도달 후 +-5도 범위를 허용
heating_gain: 2             # 20초 안에 최소 2도는 올라가야 정상 작동으로 간주함 (안 오르면 에러 발생)

# --- [베드 히터 안전장치] ---
[verify_heater heater_bed]
max_error: 120 
check_gain_time: 60         # 베드는 가열이 느리므로 60초 동안 확인
hysteresis: 5  
heating_gain: 2             # 60초 동안 최소 2도는 올라가야 정상

# --- [압출기 TMC2209 모터 드라이버 설정] ---
[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.9            # 압출기 모터 전류 (0.9A)
stealthchop_threshold: 0    # 압출의 정확도와 힘을 위해 스프레드사이클 모드 사용 (스텔스초프 끔)

# --- [가열 베드 설정] ---
[heater_bed]
heater_pin: PC9             # 베드 히터 핀 번호
sensor_type: ATC Semitec 104GT-2 # 베드 온도 센서 종류
sensor_pin: PC4             # 베드 온도 센서 핀 번호
min_temp: 0                 # 베드 최소 허용 온도
max_temp: 130               # 베드 최대 허용 온도 (ABS/PC 출력 가능 수준)

# --- [메인보드 MCU(Micro Controller Unit) 연결 설정] ---
[mcu]
# 라즈베리파이(또는 호스트)와 메인보드를 연결하는 USB 시리얼 주소
serial:/dev/serial/by-id/usb-Klipper_stm32g0b1xx_0900220004504D5930323120-if00

# (주석 처리됨) 공진 측정을 위한 ADXL345 가속도 센서 설정
# [mcu adxl] ... [resonance_tester] ...

# --- [프린터 기본 성능 한계치 설정] ---
[printer]
kinematics: corexy          # 구동 메커니즘: CoreXY 구조 (X,Y 모터가 협력하여 대각선으로 당기는 방식)
max_velocity: 500           # X, Y축 최대 이동 속도 (500mm/s)
max_accel: 13000            # X, Y축 최대 가속도 (13000mm/s² - 상당히 높은 수치)
max_z_velocity: 25          # Z축 최대 이동 속도 (25mm/s)
max_z_accel: 250            # Z축 최대 가속도 (250mm/s²)

# --- [메인보드 핀 별칭(Alias) 설정] ---
[board_pins]
aliases:
    # 디스플레이나 확장 모듈을 연결하는 EXP1 포트의 핀 번호를 알기 쉬운 이름으로 매핑
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

# --- [G코드 호(Arc) 이동 지원] ---
[gcode_arcs]
resolution: 0.1             # G2, G3 명령어(곡선 이동)를 해석할 때 곡선을 0.1mm 단위의 직선으로 쪼개어 이동

# --- [대기 시간(유휴 상태) 설정] ---
[idle_timeout]
timeout: 36000              # 프린터가 동작하지 않고 이 시간(36000초 = 10시간)이 지나면 히터와 모터의 전원을 끔

# --- [공진 보상 (Input Shaper)] ---
# 모터가 고속/고가속도로 움직일 때 발생하는 진동(잔상, 고스트 현상)을 상쇄하는 설정
[input_shaper]
shaper_type_x = ei          # X축 보상 알고리즘 방식 (EI)
shaper_freq_x = 36          # X축 보상 주파수 (36Hz)
shaper_type_y = ei          # Y축 보상 알고리즘 방식 (EI)
shaper_freq_y = 42          # Y축 보상 주파수 (42Hz)

# --- [펌웨어 업데이트 관련 빈 섹션] ---
[mcu_flash_request]
[mcu_fw_version_request]

