[printer]
kinematics: corexy
max_velocity: 500
max_accel: 13000
max_z_velocity: 25
max_z_accel: 250

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

[gcode_arcs]
resolution: 0.1

[idle_timeout]
timeout: 36000  # 10 HOUR

[input_shaper]
shaper_type_x = ei
shaper_freq_x = 36
shaper_type_y = ei
shaper_freq_y = 42

[mcu_flash_request]

[mcu_fw_version_request]

