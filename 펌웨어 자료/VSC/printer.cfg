# FILE: printer.cfg
# VERSION: 1.0.0.3
# PRINTER: xCeler(Optimus F250)
# See docs/Config_Reference.md for a description of parameters.
# https://www.klipper3d.org/Config_Reference.html

[include mainsail.cfg]
[include timelapse.cfg]
[include cubi_gcode_macro.cfg]
 
[probe]
pin: ^PC14  # 사용할 핀 번호
x_offset: 0  # X축 오프셋 (노즐과의 거리 조정)
y_offset: 0  # Y축 오프셋
#z_offset: 0,  프로브와 노즐 사이의 거리 (나중에 조정 가능)
speed: 5  # 프로빙 속도 (기본값: 5mm/s)
samples: 3          # 프로브 샘플 횟수 (3~5 추천)
sample_retract_dist: 5
samples_tolerance: 0.2
samples_tolerance_retries: 3

[bed_mesh]
speed: 300
horizontal_move_z: 5
mesh_min: 20, 20 #2, 2
mesh_max: 230, 230 
probe_count: 3,3
algorithm: bicubic
fade_start: 0.0
fade_end: 10 

[force_move]
enable_force_move: true

[homing_override]
axes: xyz
gcode:
  {% set X_OFFSET = 10 %}
  {% set Y_OFFSET = -5 %}
  {% set Z_OFFSET = 5 %}
  {% set XY_HOME_POS = 125 %}
  {% set XY_OFFSET_SPD = 2000 %}
  {% set XY_STABLE = 2000 %}
  {% set Z_SAFE = 0.2 %}
  {% set Y_SAFE = -5 %}
  # {% set val = printer["gcode_macro SET_GLOBAL"].myval %}
  # M118 "Current global variable is {{ val }}"
  
  M118 "axes = {params}"
  
  # --- X축만 홈 요청 (G28 X) ---
  {% if 'X' in params and 'Y' not in params and 'Z' not in params %}
    M118 "Only X requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
    G28 X
    G0 X{X_OFFSET} F{XY_OFFSET_SPD}
  # --- Y축만 홈 요청 (G28 Y) ---
  {% elif 'Y' in params and 'X' not in params and 'Z' not in params %}
    M118 "Only Y requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    G28 Y
    G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}
  # --- Z축만 홈 요청 (G28 Z) ---
  {% elif 'Z' in params and 'X' not in params and 'Y' not in params %}
    M118 "Only Z requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    {% if 'x' not in printer.toolhead.homed_axes %}
      FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
      FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
      G91
      G28 X
      G0 X{X_OFFSET} F{XY_OFFSET_SPD}
      G4 P{XY_STABLE} 
    {% endif %}

    {% if 'y' not in printer.toolhead.homed_axes %}
      G91
      G28 Y
      G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}
    {% endif %}
    
    G90
    G1 X{XY_HOME_POS} Y{XY_HOME_POS} F{XY_OFFSET_SPD}
    G28 Z
    G1 Z{Z_OFFSET} F1000
  # --- X, Y 축만 홈 요청 (G28 XY) ---
  {% elif 'XY' in params and 'Z' not in params %}
    M118 "Only XY requested."
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
    G28 X
    G0 X{X_OFFSET} F{XY_OFFSET_SPD}
    G4 P{XY_STABLE} 
    G28 Y
    G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}
  # --- X, Y, Z함께 홈 (G28) ---
  {% elif 'X' not in params and 'Y' not in params and 'Z' not in params %}
    G91
    FORCE_MOVE STEPPER=stepper_z DISTANCE={Z_SAFE} VELOCITY=5
    FORCE_MOVE STEPPER=stepper_x DISTANCE={Y_SAFE} VELOCITY=5
    G28 X
    G0 X{X_OFFSET} F{XY_OFFSET_SPD}
    G4 P{XY_STABLE} 
    G28 Y
    G0 Y{Y_OFFSET} F{XY_OFFSET_SPD}
    G90
    G1 X{XY_HOME_POS} Y{XY_HOME_POS} F{XY_OFFSET_SPD}
    G28 Z
    G1 Z{Z_OFFSET} F1000
  {% endif %}
    

[stepper_x]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 32 #64
rotation_distance: 40
# endstop_pin: !PC0
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: -11.5
position_max: 266 #260
position_min:-11.5
homing_speed: 60
# second_homing_speed: 25
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
# 스톨가드 신호를 받을 diag0 핀 지정
diag_pin: ^PC0
# 스톨 감도(민감도) 값 (예: +2 정도로 시작 후 튜닝)
# 핵심 파라미터
driver_SGTHRS: 100    #35  # 스톨 감도 (0~255 범위, 커질수록 민감)
hold_current: 0.50

sense_resistor: 0.110
uart_address: 0
run_current: 0.9 #0.9 #0.600
stealthchop_threshold: 0
driver_IHOLDDELAY : 8
driver_TPOWERDOWN : 20
driver_TBL : 1 #2
driver_TOFF : 2 #3
driver_HEND : 1 #0
driver_HSTRT : 7 #5
driver_PWM_AUTOGRAD : False
driver_PWM_AUTOSCALE : False
driver_PWM_LIM : 12
driver_PWM_REG : 8
driver_PWM_FREQ : 2 #1
driver_PWM_GRAD : 18 #14
driver_PWM_OFS : 36 #36

[stepper_y]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 32 #64
rotation_distance: 40
# endstop_pin: !PC1
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 261
position_max: 266
position_min: -6.0
homing_speed: 60
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
# 스톨가드 신호를 받을 diag0 핀 지정
diag_pin: PC1
# 스톨 감도(민감도) 값 (예: +2 정도로 시작 후 튜닝)
# 핵심 파라미터
driver_SGTHRS: 110 #20  # 스톨 감도 (0~255 범위, 커질수록 민감)
hold_current: 0.50

sense_resistor: 0.110
uart_address: 2
run_current: 0.9 #0.9 #0.600 
stealthchop_threshold: 0
driver_IHOLDDELAY : 8
driver_TPOWERDOWN : 20
driver_TBL : 1 #2
driver_TOFF : 2 #3
driver_HEND : 1 #0
driver_HSTRT : 7 #5
driver_PWM_AUTOGRAD : False
driver_PWM_AUTOSCALE : False
driver_PWM_LIM : 12
driver_PWM_REG : 8
driver_PWM_FREQ : 2 #1
driver_PWM_GRAD : 18 #14
driver_PWM_OFS : 36 #36

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 256
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#endstop_pin: ^PC14
#position_endstop: 300 #305.57
position_max: 310
position_min: -5
homing_speed: 5
second_homing_speed: 5
homing_retract_dist: 10

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.780
hold_current: 0.800
stealthchop_threshold: 999999

[extruder]
max_extrude_only_distance: 1000.0
max_extrude_cross_section: 80
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 32 #64 #128
rotation_distance: 5.42 #5.83 
nozzle_diameter: 0.4 
filament_diameter: 1.750 
heater_pin: PC8 
sensor_type: my_custom_thermistor #EPCOS 100K B57560G104F 
sensor_pin: PA0 
max_extrude_cross_section: 10.0 
pressure_advance: 0.04 
pressure_advance_smooth_time: 0.040 
min_temp: 0  
max_temp: 320 

[thermistor my_custom_thermistor]
temperature1: 100 
resistance1: 6610 
temperature2: 240 
resistance2: 273  
temperature3: 25 
resistance3: 100000 

[verify_heater extruder]
max_error: 300 # 목표 온도와 실제 온도 차이가 이 값 이상 나면 Shutdown
check_gain_time: 20 # 목표 온도로 가는 동안 최소 상승해야 하는 온도값
hysteresis: 5  # 목표물까지의 최대 온도 차이(섭씨 단위)
heating_gain: 2 # 히터가 증가해야 하는 최소 온도(섭씨 단위)

[verify_heater heater_bed]
max_error: 120 
check_gain_time: 60 
hysteresis: 5  
heating_gain: 2 

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.9
#hold_current: 0.2 
stealthchop_threshold: 0 #999999 

[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4
min_temp: 0
max_temp: 130

[mcu]
serial:/dev/serial/by-id/usb-Klipper_stm32g0b1xx_0900220004504D5930323120-if00

# [mcu adxl]
# serial: /dev/serial/by-id/usb-Klipper_rp2040_E66368254F1A6B22-if00

